<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard · Prediksi Haid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <div id="app"></div>
  <script src="assets/app.js"></script>
  <script>
    layout("Dashboard", "Ringkasan data & performa model prediksi keteraturan haid", "dashboard");

    (async () => {
      const page = document.getElementById("page");
      const [s, fi] = await Promise.all([loadReport("ringkasan.json"), loadReport("feature_importance.json")]);

      if (!s) {
        page.innerHTML = emptyState("Belum ada model",
          "Jalankan Proses Decision Tree untuk melihat ringkasan.",
          `<a href="proses.html" class="btn btn-primary inline-flex">Buka Proses</a>`);
        return;
      }

      const pct = (n) => s.total_data ? Math.round((n / s.total_data) * 100) : 0;
      const NAMA_FITUR = {
        tingkat_stres:"Tingkat Stres", pola_tidur:"Pola Tidur", tingkat_kelelahan:"Kelelahan",
        jadwal_kegiatan_harian:"Jadwal Kegiatan", waktu_istirahat:"Waktu Istirahat",
        pola_makan:"Pola Makan", aktivitas_harian:"Aktivitas Harian",
      };

      const stat = (label, value, sub, accent, icon) => `
        <div class="card card-hover p-5 fade-up">
          <div class="flex items-start justify-between">
            <div>
              <p class="text-[0.8rem]" style="color:var(--muted)">${label}</p>
              <p class="text-[1.9rem] font-extrabold mt-1 leading-none" style="color:var(--ink)">${value}</p>
              ${sub ? `<p class="text-[0.75rem] mt-1.5" style="color:var(--muted)">${sub}</p>` : ""}
            </div>
            <div class="w-10 h-10 rounded-xl flex items-center justify-center"
                 style="background:${accent}1a;color:${accent}"><span class="w-5 h-5">${icon}</span></div>
          </div>
        </div>`;

      page.innerHTML = `
        <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">
          ${stat("Total Data", s.total_data, "responden", "#0d9488", iconGrid())}
          ${stat("Teratur", s.jumlah_teratur, pct(s.jumlah_teratur)+"% dari total", "#10b981", iconPulse())}
          ${stat("Tidak Teratur", s.jumlah_tidak_teratur, pct(s.jumlah_tidak_teratur)+"% dari total", "#f59e0b", iconPulse())}
          ${stat("Akurasi Model", (s.akurasi*100).toFixed(1)+"%", "data uji terakhir", "#6366f1", iconChart())}
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-5 gap-4 mt-4">
          <div class="card p-5 lg:col-span-2 fade-up">
            <h3 class="font-semibold mb-1" style="color:var(--ink)">Distribusi Kelas</h3>
            <p class="text-[0.78rem] mb-2" style="color:var(--muted)">Proporsi keteraturan haid</p>
            <div class="relative" style="height:230px"><canvas id="donut"></canvas>
              <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                <span class="text-[1.7rem] font-extrabold" style="color:var(--ink)">${s.total_data}</span>
                <span class="text-[0.72rem]" style="color:var(--muted)">total data</span>
              </div>
            </div>
            <div class="flex justify-center gap-5 mt-2 text-[0.8rem]">
              <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full" style="background:var(--teratur)"></span>Teratur</span>
              <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full" style="background:var(--takteratur)"></span>Tidak Teratur</span>
            </div>
          </div>

          <div class="card p-5 lg:col-span-3 fade-up">
            <h3 class="font-semibold mb-1" style="color:var(--ink)">Faktor Paling Berpengaruh</h3>
            <p class="text-[0.78rem] mb-3" style="color:var(--muted)">Feature importance dari Decision Tree</p>
            <div style="height:250px"><canvas id="importance"></canvas></div>
          </div>
        </div>

        <div class="card p-4 mt-4 flex flex-wrap items-center gap-x-6 gap-y-1 text-[0.8rem] fade-up" style="color:var(--muted)">
          <span>ⓘ Model terakhir dilatih: <b style="color:var(--ink-2)">${s.tanggal_latih}</b></span>
          <span>Jumlah data: <b style="color:var(--ink-2)">${s.total_data}</b></span>
          <span>Rasio latih:uji: <b style="color:var(--ink-2)">${s.rasio_split}</b></span>
        </div>`;

      // ---- Chart.js ----
      let donutChart, barChart;
      Chart.defaults.font.family = "Inter, system-ui, sans-serif";

      function drawCharts() {
        const c = chartColors();
        donutChart?.destroy(); barChart?.destroy();

        donutChart = new Chart(document.getElementById("donut"), {
          type: "doughnut",
          data: { labels: ["Teratur", "Tidak Teratur"],
            datasets: [{ data: [s.jumlah_teratur, s.jumlah_tidak_teratur],
              backgroundColor: [c.teratur, c.takteratur], borderColor: c.surface,
              borderWidth: 3, hoverOffset: 6 }] },
          options: { cutout: "70%", plugins: { legend: { display: false },
            tooltip: tooltipStyle(c) }, animation: { animateScale: true } },
        });

        const items = (fi || []).slice(0, 7);
        barChart = new Chart(document.getElementById("importance"), {
          type: "bar",
          data: { labels: items.map(f => NAMA_FITUR[f.fitur] || f.fitur),
            datasets: [{ data: items.map(f => f.skor), backgroundColor: c.primary,
              borderRadius: 6, borderSkipped: false, barThickness: 18,
              hoverBackgroundColor: c.takteratur }] },
          options: { indexAxis: "y", plugins: { legend: { display: false }, tooltip: tooltipStyle(c) },
            scales: {
              x: { grid: { color: c.line, drawBorder: false }, ticks: { color: c.muted, font:{size:11} }, beginAtZero: true },
              y: { grid: { display: false }, ticks: { color: c.ink2, font:{size:12} } } },
            animation: { duration: 700 } },
        });
      }
      function tooltipStyle(c){return { backgroundColor:c.ink, titleColor:c.surface, bodyColor:c.surface,
        padding:10, cornerRadius:8, displayColors:false,
        callbacks:{ label:(ctx)=>` ${ctx.label ?? ctx.raw}: ${(+ctx.raw).toLocaleString("id-ID",{maximumFractionDigits:2})}` } };}

      drawCharts();
      document.addEventListener("themechange", drawCharts);
    })();
  </script>
</body>
</html>
